name: Build Smash Soda (Windows)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Instalar vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg integrate install

      - name: Build Release x64
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = (& $vswhere -latest -property installationPath).Trim()
          $atlVersion = (Get-ChildItem "$vsPath\VC\Tools\MSVC" | Where-Object { Test-Path "$($_.FullName)\atlmfc\include" } | Sort-Object Name -Descending | Select-Object -First 1).Name
          Write-Host "Using MSVC with ATL: $atlVersion"
          msbuild ParsecSoda.sln /p:Configuration=Release /p:Platform=x64 /m /p:UseOfATL=Dynamic "/p:VCToolsVersion=$atlVersion"

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: x64/Release/**
          fail_on_unmatched_files: false
