name: Build Smash Soda (Windows)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configurar ATL no INCLUDE
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = (& $vswhere -latest -property installationPath).Trim()
          $msvcVersion = (Get-ChildItem "$vsPath\VC\Tools\MSVC" | Sort-Object Name -Descending | Select-Object -First 1).Name
          $atlInclude = "$vsPath\VC\Tools\MSVC\$msvcVersion\atlmfc\include"
          Write-Host "ATL path: $atlInclude"
          Write-Host "Existe: $(Test-Path $atlInclude)"
          if (Test-Path $atlInclude) {
            echo "INCLUDE=$env:INCLUDE;$atlInclude" >> $env:GITHUB_ENV
            Write-Host "ATL adicionado ao INCLUDE"
          } else {
            Write-Error "ATL nao encontrado"
            exit 1
          }

      - name: Instalar vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg integrate install

      - name: Build Release x64
        run: msbuild ParsecSoda.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: x64/Release/**
          fail_on_unmatched_files: false
