name: Build Smash Soda (Windows)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Instalar vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg integrate install

      - name: Build Release x64
        run: msbuild ParsecSoda.sln /p:Configuration=Release /p:Platform=x64 /m /p:PlatformToolset=v145 /p:UseOfATL=Dynamic

      - name: Compactar Release
        shell: pwsh
        run: |
          $exe = Get-ChildItem "x64\Release\*.exe" | Select-Object -First 1
          $version = ""
          if ($exe) {
            $v = $exe.VersionInfo.FileVersion
            if ($v -and $v.Trim() -ne "" -and $v.Trim() -ne "0.0.0.0") {
              $version = "-" + ($v.Trim() -replace "[, ]+", ".")
            }
          }
          $zipName = "smash-soda$($version).zip"
          $releaseName = "smash-soda$($version)"
          Compress-Archive -Path "x64\Release\*" -DestinationPath $zipName
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_NAME=$releaseName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "${{ env.RELEASE_NAME }} #${{ github.run_number }}"
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: false
